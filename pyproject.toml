[tool.poetry]
name = "spond"
version = "1.0.0"
description = "Simple, unofficial library with some example scripts to access data from the Spond API."
authors = ["Ola Thoresen <ola@nytt.no>"]
license = "GPL 3.0"
readme = 'README.md'
repository = 'https://github.com/Olen/Spond'

[tool.poetry.dependencies]
python = "^3.8"
aiohttp = "^3.8.5"

[tool.poetry.group.dev.dependencies]
# Group for dev dependencies also required by CI
pytest = "^8.1.1"
pytest-asyncio = "^0.23.6"

[tool.poetry.group.dev-not-ci.dependencies]
# Group for dev dependencies not required by CI
ruff = "^0.6.4"  # ruff GitHub action handles install

[tool.ruff]
target-version = "py38"  # ruff doesn't yet infer this from [tool.poetry.dependencies]
exclude = ["."]
include = ["spond/*.py", "tests/*.py"]

[tool.ruff.lint]
# Enable only isort rules
select = ["I"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
